              <div id="dplayer"></div>

              <script>
                  const dp = new DPlayer({
                    container: document.getElementById('dplayer'),
                    autoplay:true,
                    theme:"#e91e63",
                    lang:'zh-tw',
                    preload:'auto',
                    airplay:true,
                    chromecast:true,
                    // logo:"images/favicon.png",
                    video: {
                      url: "https://pkj99.github.io/YTLive/民視.m3u8",
                      // pic: '{{img|safe}}',
                      type:'hls',
                          customType: {
                              hls: function (video, player) {
                                  const hls = new Hls();
                                  hls.loadSource(video.src);
                                  hls.attachMedia(video);
                              }
                          }
                    },
                      pluginOptions: {
                      hls: {
                          // hls config
                          maxBufferLength:110,
                          maxBufferSize: 80*1000*1000,
                      },
                  },
                  });

                  // dp.play();
              </script>

    <script>
        var db_url = 'https://pkj99.github.io/iptv/db/iptv.db';
        function goplay(url){
            dp.switchVideo({ url : url });
            dp.play();
        }

        // create tv list 
        function tvlists(sqlstring){
            // console.log(sqlstring);
            const xhr = new XMLHttpRequest();
            xhr.open('GET', db_url, true);
            xhr.responseType = 'arraybuffer';

            xhr.onload = e => {
                const uInt8Array = new Uint8Array(xhr.response);
                const db = new SQL.Database(uInt8Array);
                
                const contents = db.exec(sqlstring);
                var data = JSON.parse(JSON.stringify(contents));
                
                let htmlString = '';

                if (typeof data[0] == "undefined" ) { data = [];} else { data = data[0].values; }

                for (var i = 0; i < data.length; i++) {
                    var title = data[i][1];
                    var url = data[i][2];
                    var image = data[i][4];
                    image = 'images/iptv/' + title + '.png';
                    htmlString += `<li class="nav-item">`;
                    htmlString += `<a class="channel nav-link" data-value="${url}"`;
                    htmlString += ` href="javascript:goplay('${url}');"><img src="${image}" width = "46px" height="20px">&nbsp;&nbsp;${title}</a>`;
                    htmlString += `</li>`;
                }

                document.getElementById('list').innerHTML = htmlString;

            };
            xhr.send();
        }

        // create tv list 
        function tvlists2(sqlstring){
            // console.log(sqlstring);
            const xhr = new XMLHttpRequest();
            xhr.open('GET', db_url, true);
            xhr.responseType = 'arraybuffer';

            xhr.onload = e => {
                const uInt8Array = new Uint8Array(xhr.response);
                const db = new SQL.Database(uInt8Array);
                
                const contents = db.exec(sqlstring);
                var data = JSON.parse(JSON.stringify(contents));
                
                let htmlString = '';

                if (typeof data[0] == "undefined" ) { data = [];} else { data = data[0].values; }

                for (var i = 0; i < data.length; i++) {
                    var title = data[i][1];
                    var url = data[i][2];
                    var image = data[i][4];
                    htmlString += '<li class="nav-item">';
                    htmlString += '<a class="channel nav-link" data-value="'+url+'"';
                    htmlString += ' href="'+url+'" >'+title+'</a>';
                    htmlString += '</li>';
                }

                document.getElementById('list').innerHTML = htmlString;

            };
            xhr.send();
        }


        // get params
        (window.onpopstate = function () {
            var match,
                pl     = /\+/g,  // Regex for replacing addition symbol with a space
                search = /([^&=]+)=?([^&]*)/g,
                decode = function (s) { return decodeURIComponent(s.replace(pl, " ")); },
                query  = window.location.search.substring(1);

            urlParams = {};
            while (match = search.exec(query))
                urlParams[decode(match[1])] = decode(match[2]);
        })();

        if (urlParams["t"] == null){ var t = "0"; } else { var t = urlParams["t"];}
        if (t == "0"){
            var sqlstring = "select * from iptv where (catalog='台湾頻道' and title <> '民视新闻台' and title like '民视%') or (catalog = '四季頻道') ";
            tvlists(sqlstring);
            // document.getElementById('menu0').classList.add("active");
        }
        if (t == "1"){
            var sqlstring = "select pid,title,'https://pkj99.github.io/demo/m3u8/iptv/chinatv/'||title||'.m3u8' as url,catalog,image from iptv where catalog in ('央视','卫视')";
            tvlists2(sqlstring);
            // document.getElementById('menu1').classList.add("active");
        }
        if (t == "2"){
            var sqlstring = "select * from iptv where catalog = 'Youtube頻道'";
            tvlists2(sqlstring);
            // document.getElementById('menu2').classList.add("active");
        }
        if (t == "3"){
            var sqlstring = "select * from iptv_news";
            tvlists2(sqlstring);
            // document.getElementById('menu3').classList.add("active");
        }
        if (t == "4"){
            var sqlstring = "select * from iptv_sports";
            tvlists2(sqlstring);
            // document.getElementById('menu4').classList.add("active");
        }
        if (t == "5"){
            var sqlstring = "select * from iptv_movies";
            tvlists2(sqlstring);
            // document.getElementById('menu5').classList.add("active");
        }
        if (t == "6"){
            var sqlstring = "select * from iptv where catalog = '台湾頻道' and title not like '%体育%' and title not like '%新闻%' and title not like '%电影%' and title not like '%洋片%' and title not like '%HBO%'";
            tvlists2(sqlstring);
            // document.getElementById('menu6').classList.add("active");
        }
    </script>
